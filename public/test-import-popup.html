<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Status Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light p-5">
    <div class="container">
        <h2>Import Status Window Test</h2>
        <button id="test-import" class="btn btn-primary">Test Import Popup</button>
    </div>

    <!-- Status Window Template -->
    <div id="import-status-window-template" style="display: none;">
        <div id="import-status-window" class="position-fixed bottom-0 end-0 p-3" style="z-index: 99999; max-height: 90vh; overflow-y: auto;">
            <div class="card shadow-lg mb-0" style="width: 400px; border-left: 5px solid #28a745;">
                <div class="card-body p-3">
                    <div class="d-flex align-items-center mb-2">
                        <div class="spinner-border spinner-border-sm text-success me-2" role="status" id="status-spinner"></div>
                        <h6 class="mb-0 flex-grow-1" id="status-title">Importing Leads...</h6>
                        <button type="button" class="btn-close ms-auto small" id="close-status-window" style="font-size: 0.8rem;"></button>
                    </div>
                    
                    <div class="progress mb-2" style="height: 20px;">
                        <div id="status-progress-bar" class="progress-bar bg-success progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;" aria-valuenow="0">0%</div>
                    </div>
                    
                    <p class="small text-muted mb-2" id="status-message">Processing leads, please wait.</p>
                    
                    <div class="row g-2 mb-2" id="status-stats">
                        <div class="col-6">
                            <div class="card bg-light mb-0">
                                <div class="card-body p-2 text-center">
                                    <div class="text-success fw-bold" style="font-size: 1.2rem;" id="imported-count">0</div>
                                    <small class="text-muted">Imported</small>
                                </div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="card bg-warning bg-opacity-10 mb-0 border-warning" style="cursor: pointer;" id="duplicates-card">
                                <div class="card-body p-2 text-center">
                                    <div class="text-warning fw-bold" style="font-size: 1.2rem;" id="duplicates-count">0</div>
                                    <small class="text-muted">Duplicates</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="text-center mb-2">
                        <small class="text-muted">
                            <i class="ti ti-clock"></i> Time: <span id="time-elapsed">00:00</span>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $('#test-import').click(function() {
                // Show status window
                $('#import-status-window').remove();
                $('body').append($('#import-status-window-template').html());
                $('#import-status-window').css('display', 'block').fadeIn();
                
                // Simulate progress
                var progress = 0;
                var interval = setInterval(function() {
                    progress += 10;
                    $('#status-progress-bar').css('width', progress + '%').text(progress + '%');
                    $('#imported-count').text(Math.floor(progress / 2));
                    $('#duplicates-count').text(Math.floor(progress / 5));
                    
                    if (progress >= 100) {
                        clearInterval(interval);
                        $('#status-title').text('Import Complete!');
                        $('#status-spinner').hide();
                    }
                }, 500);
                
                // Time tracking
                var startTime = Date.now();
                setInterval(function() {
                    var elapsed = Math.floor((Date.now() - startTime) / 1000);
                    var minutes = Math.floor(elapsed / 60);
                    var seconds = elapsed % 60;
                    $('#time-elapsed').text(
                        (minutes < 10 ? '0' : '') + minutes + ':' + 
                        (seconds < 10 ? '0' : '') + seconds
                    );
                }, 1000);
            });
            
            $(document).on('click', '#close-status-window', function() {
                $('#import-status-window').fadeOut(function() { $(this).remove(); });
            });
        });
    </script>
</body>
</html>
